# Markdownlint configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

MD013:  # Line length
  line_length: 120
  code_blocks: false
  tables: false

MD033:  # Inline HTML
  allowed_elements:
    - details
    - summary
    - br

MD041: false  # First line need not be a top-level heading (files open with HTML comments)

MD060:  # Table column style
  style: compact
